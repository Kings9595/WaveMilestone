name: Bug Report
description: Report a bug in the WaveMilestone contract
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below with as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Call function '...'
        3. With parameters '...'
        4. See error '...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should happen...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened.
      placeholder: What actually happened...
    validations:
      required: true

  - type: dropdown
    id: contract_area
    attributes:
      label: Contract Area Affected
      description: Which area of the WaveMilestone contract is affected?
      options:
        - Pool Creation (create_milestone_pool)
        - Bounty Release (release_issue_bounty)
        - Clawback (clawback_expired_funds)
        - View/Query Methods (milestone_balance, is_claimed, milestone_info)
        - Cross-Contract Interfaces (WaveGuard, Token)
        - Events/Indexing
        - Storage/State Management
        - Access Control/Authorization
        - Not Sure / Multiple Areas
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Information about the environment where the bug occurred.
      placeholder: |
        - Network: Testnet / Mainnet / Local
        - Soroban SDK Version:
        - Contract Version/Commit:
        - Wallet/Client used:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Messages
      description: Any relevant logs, error messages, or transaction hashes.
      placeholder: Paste logs here...
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information about the bug.
      placeholder: Additional context...
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have provided all the requested information above
          required: true